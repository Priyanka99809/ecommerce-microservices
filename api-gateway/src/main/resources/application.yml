spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://order-service:8081
          predicates:
           - Path=/orders/**

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/users/**

        - id: product-service
          uri: http://product-service:8083
          predicates:
            - Path=/products/**

server:
  port: 8080

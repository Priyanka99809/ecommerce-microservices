name: Artifacts

on:
  workflow_call:
   inputs:
     name: 
       required: true
       type: string

jobs:
  build:
    env:
       my_name: ${{ inputs.name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          echo "Hello World $my_name" >> my_output.txt

      - uses: actions/upload-artifact@v6
        with:
          name: output_file
          path: my_output.txt
          
  upload:
     runs-on: ubuntu-22.04
     needs: build

     steps:
       - uses: actions/checkout@v6
       
       - uses: actions/download-artifact@v6
         with:
           id: output_file
  
        

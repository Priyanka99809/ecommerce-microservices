name: GitHub Context Demo

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Print branch
        run: |
            echo "::error file=app.js,line=10::Bug found"

      - name: Print commit
        run: |
           echo "Commit: ${{ github.sha }}"

      - name: Print repo
        run: |
           echo "Actor: ${{ github.repository }}"

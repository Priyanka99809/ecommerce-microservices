name: GitHub Context Demo

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Print branch
        run: |
            echo "::group::Build logs"
            echo "compiling..."
            echo "running tests..."
            echo "::endgroup::"

      - name: Print commit
        run: |
           echo "Commit: ${{ github.sha }}"

      - name: Print repo
        run: |
           echo "Actor: ${{ github.repository }}"

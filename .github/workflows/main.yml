name: GitHub Context Demo

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Print stop commands
        run: |
            echo "::stop-commands::ABC" 
            echo "::warning file=app.js,line=10::This will NOT be processed"
            echo "normal log still prints"
            echo "::XYZ123::"
            echo "::warning file=app.js,line=10::This WILL now be processed"

      - name: Print commit
        run: |
           echo "Commit: ${{ github.sha }}"

      - name: Print repo
        run: |
           echo "Actor: ${{ github.repository }}"

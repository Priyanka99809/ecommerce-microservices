name: GitHub Context Demo

on:
  workflow_dispatch:

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - name: Print branch
        run: echo "Branch: ${{ github.ref }}"

      - name: Print commit
        run: echo "Commit: ${{ github.sha }}"

      - name: Print actor
        run: echo "Actor: ${{ github.actor }}"
